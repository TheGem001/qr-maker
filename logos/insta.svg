<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Authentic Instagram Radial Gradient -->
    <radialGradient id="ig-grad" r="150%" cx="30%" cy="107%">
      <stop stop-color="#fdf497" offset="0%"/>
      <stop stop-color="#fdf497" offset="5%"/>
      <stop stop-color="#fd5949" offset="45%"/>
      <stop stop-color="#d6249f" offset="60%"/>
      <stop stop-color="#285AEB" offset="90%"/>
    </radialGradient>
  </defs>
  
  <!-- Rounded Background Container -->
  <rect width="512" height="512" rx="115" fill="url(#ig-grad)" />
  
  <!-- Outer Camera Box and Inner Lens -->
  <g fill="none" stroke="#ffffff" stroke-width="34">
    <rect x="112" y="112" width="288" height="288" rx="74" />
    <circle cx="256" cy="256" r="74" />
  </g>
  
  <!-- Camera Flash/Sensor Dot -->
  <circle cx="341" cy="171" r="24" fill="#ffffff" />
</svg>